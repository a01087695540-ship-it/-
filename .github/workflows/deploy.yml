name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # main과 master 둘 중 어느 브랜치를 사용하더라도 대응되게 합니다.

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # 동시 실행으로 인한 충돌 방지
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite의 빌드 결과물 폴더인 dist를 지정합니다.
          branch: gh-pages # gh-pages 브랜치에 자동으로 빌드된 정적 파일들을 업로드합니다.
